<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Checker</title>
  <link rel="stylesheet" href="2.css">
</head>
<body>

  <main class="card">
    <h1 class="title">Grade Checker</h1>

    <label for="scoreInput" class="visually-hidden">Score</label>
    <input
      type="number"
      id="scoreInput"
      class="score-input"
      placeholder="Enter score to check"
      min="0"
      max="100"
    >

    <button id="checkBtn" class="check-btn">Check</button>

    <p id="result" class="result"></p>
  </main>

  <script src="2.js"></script>
</body>
</html>
