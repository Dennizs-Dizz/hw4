<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Table Generator</title>
  <link rel="stylesheet" href="3.css">
</head>
<body>

  <main class="card">
    <h1 class="title">Multiplication Table</h1>

    <div class="input-row">
      <label for="numberInput" class="visually-hidden">Number</label>
      <input
        type="text"
        inputmode="numeric"
        id="numberInput"
        class="number-input"
        placeholder="Enter a number"
      >
      <button id="generateBtn" class="generate-btn">Generate</button>
    </div>

    <p id="errorMsg" class="error-msg"></p>

    <table id="resultTable" class="result-table hidden">
      <thead>
        <tr>
          <th>Expression</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </main>

  <script src="3.js"></script>
</body>
</html>
